<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading...</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #ffd700;
      --gold-light: #ffe566;
      --bg: #050508;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ===== PRELOADER WRAPPER ===== */
    #preloader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* ===== GRID LINES BACKGROUND ===== */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPulse 4s ease-in-out infinite;
    }
    @keyframes gridPulse {
      0%,100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ===== RADIAL GLOW ===== */
    .glow-orb {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
      animation: orbPulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes orbPulse {
      0%,100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    /* ===== CORNER DECORATIONS ===== */
    .corner {
      position: absolute;
      width: 60px; height: 60px;
      opacity: 0;
      animation: cornerFade 0.6s ease forwards;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--gold);
    }
    .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
    .corner::after  { width: 2px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 24px; left: 24px; animation-delay: 0.2s; }
    .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); animation-delay: 0.3s; }
    .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); animation-delay: 0.4s; }
    .corner.br { bottom: 24px; right: 24px; transform: scale(-1); animation-delay: 0.5s; }
    @keyframes cornerFade { to { opacity: 1; } }

    /* ===== SCANNING LINE ===== */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: scanDown 2s ease-in-out infinite;
      opacity: 0.4;
    }
    @keyframes scanDown {
      0%   { top: -2px; opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.4; }
      100% { top: 100vh; opacity: 0; }
    }

    /* ===== MAIN CONTENT ===== */
    .preloader-content {
      position: relative; z-index: 2;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
    }

    /* ===== LOGO MONOGRAM ===== */
    .logo-wrap {
      position: relative;
      margin-bottom: 32px;
      opacity: 0;
      animation: logoReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.4s forwards;
    }
    @keyframes logoReveal {
      from { opacity:0; transform: scale(0.5) rotate(-10deg); }
      to   { opacity:1; transform: scale(1) rotate(0deg); }
    }
    .logo-hexagon {
      width: 90px; height: 90px;
      background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
      border: 2px solid var(--gold);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05);
      animation: logoGlow 2s ease-in-out infinite 1.2s;
    }
    @keyframes logoGlow {
      0%,100% { box-shadow: 0 0 40px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05); }
      50%      { box-shadow: 0 0 60px rgba(255,215,0,0.5), inset 0 0 30px rgba(255,215,0,0.1); }
    }
    .logo-text {
      font-family: 'Fira Code', monospace;
      font-size: 2rem; font-weight: 600;
      color: var(--gold);
    }
    .logo-ring {
      position: absolute; inset: -12px;
      border-radius: 28px;
      border: 1px solid rgba(255,215,0,0.2);
      animation: ringRotate 6s linear infinite;
    }
    .logo-ring::after {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      transform: translateX(-50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold);
    }
    @keyframes ringRotate { to { transform: rotate(360deg); } }

    /* ===== NAME ===== */
    .preloader-name {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .name-line {
      display: block;
      transform: translateY(100%);
      animation: nameSlide 0.7s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .name-line:nth-child(1) { animation-delay: 0.9s; color: #e8e8f0; }
    .name-line:nth-child(2) {
      animation-delay: 1.0s;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @keyframes nameSlide {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* ===== ROLE TAG ===== */
    .role-tag {
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: rgba(255,215,0,0.7);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.3s forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      width: min(380px, 80vw);
      opacity: 0;
      animation: fadeUp 0.5s ease 1.5s forwards;
    }
    .progress-header {
      display: flex; justify-content: space-between;
      margin-bottom: 10px;
    }
    .progress-label {
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem; color: rgba(255,215,0,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .progress-pct {
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem; color: var(--gold);
      font-weight: 600;
    }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: visible;
      position: relative;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-light), var(--gold));
      border-radius: 2px;
      transition: width 0.1s linear;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -1px; top: 50%;
      transform: translateY(-50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold), 0 0 20px rgba(255,215,0,0.5);
    }
    .progress-steps {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    }
    .step-tag {
      font-family: 'Fira Code', monospace;
      font-size: 0.65rem; color: rgba(255,255,255,0.2);
      padding: 3px 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .step-tag.active {
      color: var(--gold);
      border-color: rgba(255,215,0,0.4);
      background: rgba(255,215,0,0.06);
      box-shadow: 0 0 8px rgba(255,215,0,0.15);
    }

    /* ===== FLOATING PARTICLES ===== */
    .float-particles {
      position: absolute; inset: 0;
      pointer-events: none; overflow: hidden;
    }
    .fp {
      position: absolute;
      border-radius: 50%;
      background: var(--gold);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity:0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-100px) scale(1); opacity:0; }
    }

    /* ===== REVEAL OVERLAY ===== */
    .reveal-overlay {
      position: fixed; inset: 0; z-index: 10000;
      pointer-events: none;
      display: grid; grid-template-columns: 1fr 1fr;
    }
    .reveal-panel {
      background: var(--bg);
      transition: transform 0.7s cubic-bezier(0.76,0,0.24,1);
    }
    .reveal-panel.left  { transform-origin: left; }
    .reveal-panel.right { transform-origin: right; }
    .reveal-overlay.open .reveal-panel.left  { transform: scaleX(0); }
    .reveal-overlay.open .reveal-panel.right { transform: scaleX(0); }

    /* ===== EXIT ANIMATION ===== */
    #preloader.exit {
      animation: preloaderExit 0.8s cubic-bezier(0.76,0,0.24,1) forwards;
    }
    @keyframes preloaderExit {
      0%   { opacity:1; transform:scale(1); }
      100% { opacity:0; transform:scale(1.05); }
    }
  </style>
</head>
<body>

<!-- REVEAL OVERLAY -->
<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-panel left"></div>
  <div class="reveal-panel right"></div>
</div>

<!-- PRELOADER -->
<div id="preloader">
  <div class="grid-bg"></div>
  <div class="glow-orb"></div>
  <div class="scan-line"></div>
  <div class="float-particles" id="floatParticles"></div>

  <!-- Corner decorations -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="preloader-content">
    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-hexagon">
        <span class="logo-text">MR</span>
      </div>
      <div class="logo-ring"></div>
    </div>

    <!-- Name -->
    <h1 class="preloader-name">
      <span class="name-line">Gogula Naga</span>
      <span class="name-line">Maheswar Reddy</span>
    </h1>

    <!-- Role -->
    <p class="role-tag">Full Stack Developer &nbsp;·&nbsp; Cloud Enthusiast</p>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Initialising Portfolio</span>
        <span class="progress-pct" id="pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-steps" id="steps"></div>
    </div>
  </div>
</div>

<script>
  // Create floating particles
  const fp = document.getElementById('floatParticles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'fp';
    const size = Math.random() * 4 + 1;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      opacity:${Math.random()*0.6+0.1};
      animation-delay:${Math.random()*5}s;
      animation-duration:${Math.random()*8+6}s;
    `;
    fp.appendChild(p);
  }

  // Progress steps
  const stepLabels = ['HTML', 'CSS', 'JavaScript', 'Node.js', 'AWS', 'MongoDB'];
  const stepsEl = document.getElementById('steps');
  stepLabels.forEach(label => {
    const s = document.createElement('span');
    s.className = 'step-tag';
    s.textContent = label;
    stepsEl.appendChild(s);
  });

  // Animate progress
  let progress = 0;
  const fill = document.getElementById('progressFill');
  const pct  = document.getElementById('pct');
  const stepEls = stepsEl.querySelectorAll('.step-tag');

  const interval = setInterval(() => {
    // Variable speed — slow then fast
    const increment = progress < 60
      ? Math.random() * 3 + 1
      : Math.random() * 6 + 3;
    progress = Math.min(progress + increment, 100);

    fill.style.width = progress + '%';
    pct.textContent = Math.floor(progress) + '%';

    // Activate step tags
    const activeCount = Math.floor((progress / 100) * stepEls.length);
    stepEls.forEach((s, i) => {
      s.classList.toggle('active', i < activeCount);
    });

    if (progress >= 100) {
      clearInterval(interval);
      pct.textContent = '100%';
      stepEls.forEach(s => s.classList.add('active'));

      // Brief pause then exit
      setTimeout(exitPreloader, 600);
    }
  }, 80);

 function exitPreloader() {
    const preloader = document.getElementById('preloader');
    preloader.classList.add('exit');
    setTimeout(() => {
      preloader.style.display = 'none';
      window.location.href = './portfolio.html';
    }, 800);
  }
</script>
</body>
</html>
